services:
  core-backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: core-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../data:/app/data
    environment:
      - CORE_LISTEN_ADDR=:8080
      - CORE_DATA_DIR=/app/data
