services:
  platform-postgres:
    image: postgres:15.10
    hostname: platform-postgres
    restart: always
    environment:
      POSTGRES_DB: "postgres"
      POSTGRES_USER: "smarthome"
      POSTGRES_PASSWORD: "smarthome"
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "postgres", "-U", "smarthome"]
      interval: 2s
      timeout: 2s
      retries: 10

  platform-service:
    build:
      context: ..
      dockerfile: services/platform-service/build/Dockerfile
    environment:
      PLATFORM_HTTP_HOST: 0.0.0.0
      PLATFORM_HTTP_PORT: 8080
      PLATFORM_GRPC_HOST: 0.0.0.0
      PLATFORM_GRPC_PORT: 9000
      PLATFORM_DB_HOST: platform-postgres
      PLATFORM_DB_PORT: 5432
      PLATFORM_DB_USER: smarthome
      PLATFORM_DB_PASSWORD: smarthome
      PLATFORM_DB_NAME: smarthome
      PLATFORM_DB_SSLMODE: disable
      PLATFORM_COMMAND_RETRY_AFTER: 30s
      PLATFORM_VOICE_RECOGNITION_ADDR: voice-recognition-service:9010
    ports:
      - "8080:8080"
      - "8081:8080"
      - "9000:9000"
      - "9001:9000"
      - "9002:9000"
      - "9004:9000"
      - "9005:9000"
    depends_on:
      platform-postgres:
        condition: service_healthy
      voice-recognition-service:
        condition: service_started

  context-service:
    build:
      context: ..
      dockerfile: services/context-service/build/Dockerfile
    ports:
      - "8083:8083"
      - "9003:9003"

  voice-recognition-service:
    build:
      context: ..
      dockerfile: services/voice-recognition-service/build/Dockerfile
    environment:
      VOICE_RECOGNITION_GRPC_PORT: 9010
      VOICE_RECOGNITION_ASR_MODEL: artyomboyko/whisper-small-ru-v2
      VOICE_RECOGNITION_EMBEDDING_MODEL: all-MiniLM-L6-v2
      VOICE_RECOGNITION_SIMILARITY_THRESHOLD: 0.0
    ports:
      - "9010:9010"

  vision-service:
    build:
      context: ..
      dockerfile: services/vision-service/build/Dockerfile
    ports:
      - "8086:8086"
      - "9006:9006"

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/build/Dockerfile
    ports:
      - "8087:8087"
      - "9007:9007"
