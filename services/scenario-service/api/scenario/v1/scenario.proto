syntax = "proto3";

package scenario.v1;

option go_package = "scenario-service/pkg/pb/scenario/v1;scenariov1";

import "google/protobuf/timestamp.proto";

service ScenarioService {
  rpc ListScenarios(ListScenariosRequest) returns (ListScenariosResponse);
  rpc GetScenario(GetScenarioRequest) returns (GetScenarioResponse);
  rpc SaveScenario(SaveScenarioRequest) returns (SaveScenarioResponse);
  rpc EvaluateEvent(EvaluateEventRequest) returns (EvaluateEventResponse);
  rpc GetOfflineScenarios(GetOfflineScenariosRequest) returns (GetOfflineScenariosResponse);
  rpc ListVoiceCommands(ListVoiceCommandsRequest) returns (ListVoiceCommandsResponse);
  rpc ExecuteVoiceCommand(ExecuteVoiceCommandRequest) returns (ExecuteVoiceCommandResponse);
}

message Trigger {
  string trigger_type = 1;
  string event_type = 2;
  string entity_id = 3;
  string expected_state = 4;
  string command_name = 5;
  string device_id = 6;
}

message Condition {
  string condition_type = 1;
  string field = 2;
  string expected_value = 3;
}

message Action {
  string action_type = 1;
  string device_id = 2;
  string entity_id = 3;
  string target_state = 4;
}

message Scenario {
  string scenario_id = 1;
  string edge_id = 2;
  string name = 3;
  bool enabled = 4;
  int32 priority = 5;
  bool offline_eligible = 6;
  repeated Trigger triggers = 7;
  repeated Condition conditions = 8;
  repeated Action actions = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message EventEnvelope {
  string event_id = 1;
  string edge_id = 2;
  string room_id = 3;
  string entity_id = 4;
  string event_type = 5;
  string state = 6;
  google.protobuf.Timestamp occurred_at = 7;
  string device_id = 8;
}

message Decision {
  string decision_id = 1;
  string status = 2;
  repeated Action actions = 3;
  repeated string matched_scenario_ids = 4;
}

message VoiceCommand {
  string scenario_id = 1;
  string scenario_name = 2;
  string edge_id = 3;
  string room_id = 4;
  string command_name = 5;
  string device_id = 6;
  string entity_id = 7;
  string target_state = 8;
  int32 priority = 9;
}

message ListScenariosRequest {
  string edge_id = 1;
}

message ListScenariosResponse {
  repeated Scenario scenarios = 1;
}

message GetScenarioRequest {
  string scenario_id = 1;
}

message GetScenarioResponse {
  Scenario scenario = 1;
}

message SaveScenarioRequest {
  Scenario scenario = 1;
}

message SaveScenarioResponse {
  Scenario scenario = 1;
}

message EvaluateEventRequest {
  EventEnvelope event = 1;
  bool defer_execution = 2;
}

message EvaluateEventResponse {
  Decision decision = 1;
}

message GetOfflineScenariosRequest {
  string edge_id = 1;
}

message GetOfflineScenariosResponse {
  repeated Scenario scenarios = 1;
}

message ListVoiceCommandsRequest {
  string edge_id = 1;
  string room_id = 2;
}

message ListVoiceCommandsResponse {
  repeated VoiceCommand commands = 1;
}

message ExecuteVoiceCommandRequest {
  string edge_id = 1;
  string room_id = 2;
  string command_name = 3;
  string source = 4;
  bool defer_execution = 5;
}

message ExecuteVoiceCommandResponse {
  string scenario_id = 1;
  string scenario_name = 2;
  Decision decision = 3;
  string status = 4;
}
