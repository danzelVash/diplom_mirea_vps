syntax = "proto3";

package edge_bridge.v1;

option go_package = "edge-bridge-service/pkg/pb/edge_bridge/v1;edgebridgev1";

import "google/protobuf/timestamp.proto";

service EdgeBridgeService {
  rpc RegisterEdge(RegisterEdgeRequest) returns (RegisterEdgeResponse);
  rpc SyncInventory(SyncInventoryRequest) returns (SyncInventoryResponse);
  rpc PublishEvent(PublishEventRequest) returns (PublishEventResponse);
  rpc PollCommands(PollCommandsRequest) returns (PollCommandsResponse);
  rpc GetOfflineScenarios(GetOfflineScenariosRequest) returns (GetOfflineScenariosResponse);
  rpc ExecuteVoiceCommand(ExecuteVoiceCommandRequest) returns (ExecuteVoiceCommandResponse);
}

message EdgeNode {
  string edge_id = 1;
  string name = 2;
  string public_addr = 3;
}

message EdgeRoom {
  string room_id = 1;
  string name = 2;
}

message EdgeDevice {
  string device_id = 1;
  string room_id = 2;
  string entity_id = 3;
  string name = 4;
  string device_type = 5;
  string state = 6;
}

message EdgeEvent {
  string event_id = 1;
  string edge_id = 2;
  string room_id = 3;
  string device_id = 4;
  string entity_id = 5;
  string event_type = 6;
  string state = 7;
  google.protobuf.Timestamp occurred_at = 8;
}

message EdgeCommand {
  string command_id = 1;
  string device_id = 2;
  string entity_id = 3;
  string target_state = 4;
  string source = 5;
}

message OfflineScenario {
  string scenario_id = 1;
  string name = 2;
  int32 priority = 3;
}

message RegisterEdgeRequest {
  EdgeNode edge = 1;
}

message RegisterEdgeResponse {
  string status = 1;
}

message SyncInventoryRequest {
  string edge_id = 1;
  repeated EdgeRoom rooms = 2;
  repeated EdgeDevice devices = 3;
}

message SyncInventoryResponse {
  string sync_id = 1;
  string status = 2;
}

message PublishEventRequest {
  EdgeEvent event = 1;
}

message PublishEventResponse {
  string status = 1;
}

message PollCommandsRequest {
  string edge_id = 1;
}

message PollCommandsResponse {
  repeated EdgeCommand commands = 1;
}

message GetOfflineScenariosRequest {
  string edge_id = 1;
}

message GetOfflineScenariosResponse {
  repeated OfflineScenario scenarios = 1;
}

message ExecuteVoiceCommandRequest {
  bytes audio = 1;
  string edge_id = 2;
  string room_id = 3;
  string source = 4;
}

message ExecuteVoiceCommandResponse {
  string command_id = 1;
  string recognized_command = 2;
  string scenario_id = 3;
  string scenario_name = 4;
  string device_id = 5;
  string entity_id = 6;
  string target_state = 7;
  string status = 8;
}
