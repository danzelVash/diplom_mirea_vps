syntax = "proto3";

package voice.v1;

option go_package = "voice-service/pkg/pb/voice/v1;voicev1";

service VoiceService {
  rpc ParseVoiceCommand(ParseVoiceCommandRequest) returns (ParseVoiceCommandResponse);
  rpc MatchOfflinePhrase(MatchOfflinePhraseRequest) returns (MatchOfflinePhraseResponse);
}

message Slot {
  string name = 1;
  string value = 2;
}

message ParsedVoiceCommand {
  string command_id = 1;
  string intent = 2;
  string room_id = 3;
  string device_id = 4;
  string entity_id = 5;
  string target_state = 6;
  double confidence = 7;
  repeated Slot slots = 8;
}

message ParseVoiceCommandRequest {
  bytes audio = 1;
  string edge_id = 2;
  string room_id = 3;
}

message ParseVoiceCommandResponse {
  ParsedVoiceCommand command = 1;
}

message MatchOfflinePhraseRequest {
  string phrase = 1;
  string edge_id = 2;
}

message MatchOfflinePhraseResponse {
  ParsedVoiceCommand command = 1;
}

