syntax = "proto3";

package voice_recognition.v1;

option go_package = "voice-service/pkg/pb/voice_recognition/v1;voicerecognitionv1";

service VoiceRecognitionService {
  rpc GetAudio(GetAudioRequest) returns (GetAudioResponse);
}

message GetAudioRequest {
  bytes chunk = 1;
  repeated Command commands = 2;

  message Command {
    string name = 1;
  }
}

message GetAudioResponse {
  string command = 1;
}
